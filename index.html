<!DOCTYPE html>
<html>
<head>
  <title>Chaos Corner</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    button {
      padding: 12px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: white;
      color: #333;
      transition: 0.3s;
    }

    button:hover {
      background: #ddd;
    }

    .container {
      margin-top: 50px;
    }
  </style>
</head>

<body>

  <header>🌪️ Chaos Corner</header>

  <div class="container">
    <h1>Welcome 😄</h1>
    <p>This is my random fun website</p>

    <button onclick="goToFun()">🎉 Fun Page</button>
    <button onclick="like()">❤️ Like</button>

    <p>Likes: <span id="count">0</span></p>
  </div>

  <script>
    function goToFun() {
      window.location.href = "fun.html";
    }

    let count = localStorage.getItem("likes") || 0;
    document.getElementById("count").innerText = count;

    function like() {
      count++;
      localStorage.setItem("likes", count);
      document.getElementById("count").innerText = count;
    }
  </script>

</body>
</html>
